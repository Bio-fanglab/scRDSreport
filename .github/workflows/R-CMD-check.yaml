on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      NOT_CRAN: true
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false
    steps:
      - uses: actions/checkout@v7
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # SCP lists many integration engines as optional Suggests. Installing
          # every transitive Suggest would make a standard package check depend
          # on unrelated GitHub-only tools such as symphony. Install hard
          # dependencies recursively and list this package's own Suggests below.
          dependencies: '"hard"'
          extra-packages: |
            any::rcmdcheck
            any::testthat
            any::quarto
            bioc::SingleCellExperiment
            bioc::SummarizedExperiment
            github::zhanghao-njmu/SCP
          needs: check
      - name: Install package and verify the hard dependency chain
        run: |
          R CMD INSTALL .
          Rscript -e 'library(scRDSreport); check_dependencies(profile = "report_only", render = TRUE, strict = TRUE)'
          Rscript -e 'library(scRDSreport); plan <- install_dependencies(profile = "full", species = "mouse", render = TRUE, dry_run = TRUE); stopifnot(nrow(plan) > 0L, !anyNA(plan$action))'
      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
